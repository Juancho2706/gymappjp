name: Mobile Integration CI

on:
  pull_request:
    branches: [rnmobiledenuevo]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/mobile-integration-ci.yml'
  workflow_dispatch:

jobs:
  mobile-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Typecheck Expo React Native
        run: pnpm --filter @eva/mobile exec tsc --noEmit
