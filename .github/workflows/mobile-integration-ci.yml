name: Mobile Integration CI

on:
  pull_request:
    branches: [rnmobiledenuevo]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/mobile-integration-ci.yml'
  workflow_dispatch:

jobs:
  mobile-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Typecheck Expo React Native
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @eva/mobile exec tsc --noEmit 2>&1 | tee mobile-typecheck.log
      - name: Upload mobile typecheck errors
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-typecheck-errors
          path: mobile-typecheck.log
          if-no-files-found: error
          retention-days: 7
