name: Email Drip Scheduler

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-drip:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger drip run endpoint
        env:
          APP_URL: ${{ secrets.BETA_APP_URL }}
          DRIP_CRON_TOKEN: ${{ secrets.DRIP_CRON_TOKEN }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$DRIP_CRON_TOKEN" ]; then
            echo "Missing BETA_APP_URL or DRIP_CRON_TOKEN secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$APP_URL/api/internal/email-drip/run" \
            -H "Authorization: Bearer $DRIP_CRON_TOKEN" \
            -H "Content-Type: application/json"
