name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # version comes from the root package.json "packageManager" field (pnpm@11.5.0);
      # passing `version:` here too triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      # --ignore-scripts blocks postinstall supply chain attacks (pnpm v10+ protection)
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # Blocking gate: the 5 react-compiler errors were cleared (Fase 2.4), so lint is green
      # (0 errors; warnings don't fail). Re-introducing a lint error now fails CI.
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: npx vitest run
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

  e2e:
    needs: quality
    # Manual-only for now: this Playwright-against-real-Supabase suite hangs/times out and
    # had never actually run (CI was dead, so it went unmaintained). Trigger on demand via
    # "Run workflow" while it is tuned (timeouts / seed / login); re-enable on pull_request
    # once it is reliable. quality (typecheck + vitest) is the enforcing PR gate.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # version comes from the root package.json "packageManager" field (pnpm@11.5.0);
      # passing `version:` here too triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: npx playwright install --with-deps
      - name: Enterprise RLS isolation
        run: pnpm run test:e2e:enterprise-rls
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_COACH_SLUG: ${{ secrets.E2E_COACH_SLUG }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_WORKOUT_PLAN_ID: ${{ secrets.E2E_WORKOUT_PLAN_ID }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          if-no-files-found: ignore

  nutrition-smoke:
    needs: quality
    # Manual-only for now (same reason as e2e): unmaintained smoke suite times out against
    # real Supabase. Run on demand via "Run workflow" until tuned.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # secrets cannot be used in a job-level `if:` (invalid workflow). Mirror them into
    # env (allowed) and gate each step on env instead, so the job no-ops when the E2E
    # secrets are absent (e.g. forks) without breaking the whole workflow file.
    env:
      E2E_COACH_SLUG: ${{ secrets.E2E_COACH_SLUG }}
      E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
      E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      # version comes from the root package.json "packageManager" field (pnpm@11.5.0);
      # passing `version:` here too triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - if: ${{ env.E2E_COACH_SLUG == '' || env.E2E_CLIENT_EMAIL == '' || env.E2E_CLIENT_PASSWORD == '' }}
        run: echo "E2E secrets not configured — skipping nutrition smoke."
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: npx playwright install --with-deps
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: pnpm run e2e:check-env
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: pnpm run test:e2e:nutrition
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-nutrition-smoke
          path: playwright-report/
          if-no-files-found: ignore
