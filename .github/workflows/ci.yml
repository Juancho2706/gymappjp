name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      # --ignore-scripts blocks postinstall supply chain attacks (pnpm v10+ protection)
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # NOTE: non-blocking until the react-compiler lint PR clears the 5 pre-existing
      # errors (see docs/audits/deferred-attack-plan-2026-06-24.md, Fase 2.4). Flip to
      # blocking (remove continue-on-error) once `pnpm run lint` is green.
      - run: pnpm run lint
        continue-on-error: true
      - run: pnpm run typecheck
      - run: npx vitest run
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: npx playwright install --with-deps
      - name: Enterprise RLS isolation
        run: pnpm run test:e2e:enterprise-rls
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_COACH_SLUG: ${{ secrets.E2E_COACH_SLUG }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_WORKOUT_PLAN_ID: ${{ secrets.E2E_WORKOUT_PLAN_ID }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          if-no-files-found: ignore

  nutrition-smoke:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # secrets cannot be used in a job-level `if:` (invalid workflow). Mirror them into
    # env (allowed) and gate each step on env instead, so the job no-ops when the E2E
    # secrets are absent (e.g. forks) without breaking the whole workflow file.
    env:
      E2E_COACH_SLUG: ${{ secrets.E2E_COACH_SLUG }}
      E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
      E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - if: ${{ env.E2E_COACH_SLUG == '' || env.E2E_CLIENT_EMAIL == '' || env.E2E_CLIENT_PASSWORD == '' }}
        run: echo "E2E secrets not configured — skipping nutrition smoke."
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: npx playwright install --with-deps
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: pnpm run e2e:check-env
      - if: ${{ env.E2E_COACH_SLUG != '' && env.E2E_CLIENT_EMAIL != '' && env.E2E_CLIENT_PASSWORD != '' }}
        run: pnpm run test:e2e:nutrition
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-nutrition-smoke
          path: playwright-report/
          if-no-files-found: ignore
