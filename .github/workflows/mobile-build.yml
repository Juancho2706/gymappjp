name: Mobile Build (EAS)

on:
  push:
    branches: [v2/enterprise]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (staging)
        working-directory: apps/mobile
        run: eas build --platform android --profile staging --non-interactive

  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (staging)
        working-directory: apps/mobile
        run: eas build --platform ios --profile staging --non-interactive
