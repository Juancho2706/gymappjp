name: Mobile Build (Local — no EAS credits)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        default: 'mobile'
        type: choice
        options:
          - mobile
          - enterprise
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prodpreview
          - production
      submit_ios:
        description: 'Auto-submit iOS IPA to TestFlight after build'
        required: false
        default: false
        type: boolean
      submit_android:
        description: 'Auto-submit Android AAB to Google Play internal testing after build (profile production only)'
        required: false
        default: false
        type: boolean

jobs:
  build-android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Inject prod env vars into eas.json for prodpreview/production
        if: ${{ inputs.profile == 'prodpreview' || inputs.profile == 'production' }}
        working-directory: apps/${{ inputs.app }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          node -e "
            const fs = require('fs');
            const url = process.env.SUPABASE_URL;
            const key = process.env.SUPABASE_KEY;
            // Secrets vacios -> JSON.stringify dropea el undefined y el AAB/IPA
            // compila sin Supabase (crash 'supabaseUrl is required' en runtime).
            const missing = [];
            if (!url || !url.trim()) missing.push('NEXT_PUBLIC_SUPABASE_URL');
            if (!key || !key.trim()) missing.push('NEXT_PUBLIC_SUPABASE_ANON_KEY');
            if (missing.length) {
              console.error('ERROR: secret(s) vacio(s) para profile ' + process.env.BUILD_PROFILE + ': ' + missing.join(', ') + '. Configuralos en GitHub Actions secrets; sin ellos la app compila pero arranca sin Supabase.');
              process.exit(1);
            }
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            const profile = eas.build[process.env.BUILD_PROFILE];
            profile.env.EXPO_PUBLIC_SUPABASE_URL = url;
            profile.env.EXPO_PUBLIC_SUPABASE_ANON_KEY = key;
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
          "

      # production (sin buildType) genera AAB — formato que exige Google Play.
      # staging/prodpreview generan APK para sideload directo.
      - name: Determine Android artifact type
        id: android_artifact
        run: |
          if [ "${{ inputs.profile }}" = "production" ]; then
            echo "ext=aab" >> "$GITHUB_OUTPUT"
          else
            echo "ext=apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android (${{ inputs.profile }})
        working-directory: apps/${{ inputs.app }}
        env:
          EXPO_ROUTER_APP_ROOT: ${{ github.workspace }}/apps/${{ inputs.app }}/app
          GRADLE_OPTS: "-Xmx5g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.daemon.jvm.options=-Xmx2g,-XX:MaxMetaspaceSize=1g"
          JAVA_TOOL_OPTIONS: "-Xmx5g -XX:MaxMetaspaceSize=2g"
        run: eas build --platform android --profile ${{ inputs.profile }} --local --non-interactive --output ./build.${{ steps.android_artifact.outputs.ext }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app }}-android-${{ inputs.profile }}-${{ github.run_number }}
          path: apps/${{ inputs.app }}/build.${{ steps.android_artifact.outputs.ext }}
          retention-days: 14

      # Requiere que la app exista en Play Console y que la PRIMERA subida se haya
      # hecho manual por la UI (limitación de la Google Play Developer API).
      # El track destino (internal) vive en eas.json → submit.production.android.
      - name: Submit AAB to Google Play (internal testing)
        if: ${{ inputs.submit_android == true && inputs.profile == 'production' }}
        working-directory: apps/${{ inputs.app }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > ./google-service-account.json
          eas submit --platform android --profile production --path ./build.aab --non-interactive

  build-ios:
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify Xcode iOS SDK
        run: |
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iPhoneOS SDK: $SDK_VERSION"
          MAJOR="${SDK_VERSION%%.*}"
          if [ "$MAJOR" -lt 26 ]; then
            echo "App Store Connect requires iOS SDK 26 or later."
            exit 1
          fi

      - name: Inject prod env vars into eas.json for prodpreview/production
        if: ${{ inputs.profile == 'prodpreview' || inputs.profile == 'production' }}
        working-directory: apps/${{ inputs.app }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          node -e "
            const fs = require('fs');
            const url = process.env.SUPABASE_URL;
            const key = process.env.SUPABASE_KEY;
            // Secrets vacios -> JSON.stringify dropea el undefined y el AAB/IPA
            // compila sin Supabase (crash 'supabaseUrl is required' en runtime).
            const missing = [];
            if (!url || !url.trim()) missing.push('NEXT_PUBLIC_SUPABASE_URL');
            if (!key || !key.trim()) missing.push('NEXT_PUBLIC_SUPABASE_ANON_KEY');
            if (missing.length) {
              console.error('ERROR: secret(s) vacio(s) para profile ' + process.env.BUILD_PROFILE + ': ' + missing.join(', ') + '. Configuralos en GitHub Actions secrets; sin ellos la app compila pero arranca sin Supabase.');
              process.exit(1);
            }
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            const profile = eas.build[process.env.BUILD_PROFILE];
            profile.env.EXPO_PUBLIC_SUPABASE_URL = url;
            profile.env.EXPO_PUBLIC_SUPABASE_ANON_KEY = key;
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
          "

      - name: Prepare iOS credentials
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_PROV_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > /tmp/dist.p12
          echo "$IOS_PROV_PROFILE_BASE64" | base64 --decode > /tmp/app.mobileprovision
          python3 - <<'PYEOF'
          import json, os
          creds = {
            "ios": {
              "distributionCertificate": {
                "path": "/tmp/dist.p12",
                "password": os.environ["IOS_DIST_CERT_PASSWORD"]
              },
              "provisioningProfilePath": "/tmp/app.mobileprovision"
            }
          }
          app = "${{ inputs.app }}"
          with open(f"apps/{app}/credentials.json", "w") as f:
              json.dump(creds, f, indent=2)
          PYEOF

      - name: Build iOS (${{ inputs.profile }})
        working-directory: apps/${{ inputs.app }}
        env:
          EXPO_ROUTER_APP_ROOT: ${{ github.workspace }}/apps/${{ inputs.app }}/app
        run: eas build --platform ios --profile ${{ inputs.profile }} --local --non-interactive --output ./build.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app }}-ios-${{ inputs.profile }}-${{ github.run_number }}
          path: apps/${{ inputs.app }}/build.ipa
          retention-days: 14

      - name: Submit IPA to TestFlight (App Store Connect)
        if: ${{ inputs.submit_ios == true }}
        working-directory: apps/${{ inputs.app }}
        env:
          EXPO_ASC_API_KEY_PATH: /tmp/asc-api-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          printf '%s' "$ASC_API_KEY_P8" > /tmp/asc-api-key.p8
          eas submit --platform ios --profile ${{ inputs.profile }} --path ./build.ipa --non-interactive
